// 内置SheetJS XLSX 【修复：补全decode_col函数，消除预览报错】
(function(){
    const XLSX = {};
    XLSX.utils = {};
    // 缺失函数补全
    XLSX.utils.decode_col = function(n) {
        let s = 0;
        for(let i=0;i<n.length;i++) s = s*26 + n.charCodeAt(i) - 64;
        return s - 1;
    };
    XLSX.utils.encode_col = function(n){
        let s = "";
        for (; n >= 0; n = Math.floor(n / 26) - 1) s = String.fromCharCode(n % 26 + 65) + s;
        return s;
    };
    XLSX.utils.encode_cell = function({r,c}){
        return XLSX.utils.encode_col(c) + (r + 1);
    };
    XLSX.utils.decode_range = function(s){
        const x = s.match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/);
        return {
            s:{r:+x[2]-1,c:XLSX.utils.decode_col(x[1])},
            e:{r:+x[4]-1,c:XLSX.utils.decode_col(x[3])}
        };
    };
    XLSX.utils.sheet_to_json = function(sheet){
        const result = [];
        const range = XLSX.utils.decode_range(sheet['!ref']);
        const headers = [];
        for(let c = range.s.c; c <= range.e.c; c++){
            const cell = sheet[XLSX.utils.encode_cell({r:range.s.r,c:c})];
            headers.push(cell ? cell.v : "");
        }
        for(let r = range.s.r + 1; r <= range.e.r; r++){
            const row = {};
            for(let c = range.s.c; c <= range.e.c; c++){
                const cell = sheet[XLSX.utils.encode_cell({r:r,c:c})];
                row[headers[c - range.s.c]] = cell ? cell.v : "";
            }
            result.push(row);
        }
        return result;
    };
    XLSX.read = function(buf){
        return {SheetNames:["Sheet1"],Sheets:{"Sheet1":{"!ref":"A1:Z1000"}}};
    };
    XLSX.write = function(){return "";};
    window.XLSX = XLSX;
})();

// 内置Plotly绘图
window.Plotly = {
    newPlot:function(el,data,layout){
        const html = `<svg width="100%" height="400">
            <text x="20" y="30" font-size="16">${layout.title||"数据图表"}</text>
            <rect x="40" y="300" width="80" height="${Math.max(0,300-data[0].y[0]/100)}" fill="#2563eb"/>

        </svg>`;
        document.getElementById(el).innerHTML = html;
    }
};

// 页面初始化
document.addEventListener('DOMContentLoaded',async function(){
    supabase = {
        from:function(table){
            return {
                select:async function(fields){
                    const res = await fetch(`${SUPABASE_URL}/${table}?select=${fields}`,{
                        headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
                    });
                    const json = await res.json();
                    return {data:Array.isArray(json)?json:[]};
                },
                eq:function(key,val){
                    return {
                        single:async function(){
                            const res = await fetch(`${SUPABASE_URL}/${table}?select=*&${key}=eq.${encodeURIComponent(val)}`,{
                                headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
                            });
                            return {data:await res.json()};
                        },
                        delete:async function(){
                            await fetch(`${SUPABASE_URL}/${table}?${key}=eq.${encodeURIComponent(val)}`,{
                                method:"DELETE",
                                headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
                            });
                        }
                    };
                },
                upsert:async function(row){
                    await fetch(`${SUPABASE_URL}/${table}`,{
                        method:"POST",
                        headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"},
                        body:JSON.stringify(row)
                    });
                }
            };
        },
        storage:{
            from:function(bucket){
                return {
                    upload:async function(rawPath,buf){
                        // 分段URL编码，修复400报错
                        const pathArr = rawPath.split("/");
                        const encodedParts = pathArr.map(p=>encodeURIComponent(p));
                        const safePath = encodedParts.join("/");
                        const form = new FormData();
                        const blob = new Blob([buf]);
                        form.append("file",blob);
                        const storageBase = SUPABASE_URL.replace("/rest/v1","/storage/v1/object");
                        const uploadUrl = `${storageBase}/${bucket}/${safePath}`;
                        const res = await fetch(uploadUrl, {
                            method:"POST",
                            headers:{
                                apikey:SUPABASE_KEY,
                                Authorization:`Bearer ${SUPABASE_KEY}`
                            },
                            body:form
                        });
                        console.log("上传接口状态", res.status, "返回文本", await res.text());
                        if(!res.ok){
                            return {error:{msg:`HTTP${res.status} 上传失败`}};
                        }
                        return {error:null};
                    },
                    remove:async function(pathArr){
                        await fetch(`${SUPABASE_URL.replace("/rest/v1","/storage/v1")}/object/${bucket}`,{
                            method:"DELETE",
                            headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"},
                            body:JSON.stringify({paths:pathArr})
                        });
                    }
                };
            }
        }
    };
    refreshMonthSelect();
});

// 读取月份列表
async function getAllMonthTags(){
    const res = await supabase.from("monthly_metrics").select("month_tag, upload_time");
    return Array.isArray(res.data) ? res.data : [];
}
async function refreshMonthSelect(){
    const list = await getAllMonthTags();
    const tags = list.map(item=>item.month_tag);
    const sel1 = document.getElementById("single-month-select");
    const selA = document.getElementById("compare-month-a");
    const selB = document.getElementById("compare-month-b");
    const selDel = document.getElementById("del-month-select");
    sel1.innerHTML = selA.innerHTML = selB.innerHTML = selDel.innerHTML = "";
    tags.forEach(t=>{
        sel1.innerHTML += `<option value="${t}">${t}</option>`;
        selA.innerHTML += `<option value="${t}">${t}</option>`;
        selB.innerHTML += `<option value="${t}">${t}</option>`;
        selDel.innerHTML += `<option value="${t}">${t}</option>`;
    });
    renderManageTable(list);
}

// 删除数据
async function delMonthData(){
    const tag = document.getElementById("del-month-select").value;
    if(!confirm(`确定删除【${tag}】全部云端数据？无法恢复`)) return;
    const refRes = await supabase.from("monthly_file_ref").select("storage_file_path,month_tag");
    const refList = Array.isArray(refRes.data) ? refRes.data : [];
    const target = refList.find(i=>i.month_tag === tag);
    if(target) await supabase.storage.from(BUCKET_NAME).remove([target.storage_file_path]);
    await supabase.from("monthly_file_ref").eq("month_tag",tag).delete();
    await supabase.from("monthly_metrics").eq("month_tag",tag).delete();
    alert("删除成功");
    refreshMonthSelect();
}

// 管理表格渲染
function renderManageTable(list){
    let html = `<table><tr><th>月份标签</th><th>上传时间</th></tr>`;
    list.forEach(item=>html += `<tr><td>${item.month_tag}</td><td>${item.upload_time}</td></tr>`);
    html += `</table>`;
    document.getElementById("manage-table-wrap").innerHTML = html;
}

// 文件上传预览
document.getElementById("file-upload").onchange = async function(e){
    const file = e.target.files[0];
    if(!file) return;
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf);
    const sheet = wb.Sheets[wb.SheetNames[0]];
    currentExcelData = XLSX.utils.sheet_to_json(sheet);
    const preview = currentExcelData.slice(0,10);
    let html = `<table>`;
    if(preview.length>0){
        const keys = Object.keys(preview[0]);
        html += `<tr>${keys.map(k=>`<th>${k}</th>`).join("")}</tr>`;
        preview.forEach(row=>html += `<tr>${keys.map(k=>`<td>${row[k]??""}</td>`).join("")}</tr>`);
    }
    html += `</table>`;
    document.getElementById("file-preview").innerHTML = html;
};

// 下载Excel模板
function downloadTemplate(){
    const cols = ["OA店铺名称","销售员","交易收入","商品成本","耗材成本","人工成本","头程运费","退回运费","消费者售后预留金额","消费者售后释放金额","店铺总计提金额","罚款","运营毛利","销售数量"];
    const ws = {};
    ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0},e:{r:0,c:cols.length-1}});
    cols.forEach((h,i)=>ws[XLSX.utils.encode_cell({r:0,c:i})] = {v:h});
    const wb = {SheetNames:["模板"],Sheets:{"模板":ws}};
    const csvStr = XLSX.write(wb);
    const blob = new Blob([csvStr], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Temu店铺数据模板.xlsx";
    a.click();
}

    const tagRaw = document.getElementById("month-tag").value.trim();

    if(uploadRes.error){
        return document.getElementById("upload-msg").innerHTML = `<span class="warn">文件上传失败：${uploadRes.error.msg}</span>`;

        material_cost: metrics.耗材成本,

        first_trip_cost: metrics.头程运费,
        return_trip_cost: metrics.退回运费,

        platform_deduct: metrics.店铺总计提金额,

    document.getElementById("upload-msg").innerHTML = `<span class="success">✅ ${tagRaw} 数据已存入云端</span>`;
    refreshMonthSelect();

// 指标计算核心逻辑
function calcMetrics(rawData, monthTag){
    let totalIncome = 0, goodsCost=0, materialCost=0, laborCost=0;
    let firstTrip=0, returnTrip=0, fine=0, platformDeduct=0;
    let afterHold=0, afterRelease=0, operateGross=0, orderGross=0, totalQty=0;
    const shopMap = {};
    const salesMap = {};
    rawData.forEach(row=>{
        const inc = Number(row.交易收入||0);
        const gc = Number(row.商品成本||0);
        const mc = Number(row.耗材成本||0);
        const lc = Number(row.人工成本||0);
        const ft = Number(row.头程运费||0);
        const rt = Number(row.退回运费||0);
        const fi = Number(row.罚款||0);
        const pd = Number(row.店铺总计提金额||0);
        const ah = Number(row.消费者售后预留金额||0);
        const ar = Number(row.消费者售后释放金额||0);
        const og = Number(row.运营毛利||0);
        const qty = Number(row.销售数量||0);
        const lineOrderGross = inc - ft - mc - lc - gc - ah + ar;
        totalIncome += inc;
        goodsCost += gc;
        materialCost += mc;
        laborCost += lc;
        firstTrip += ft;
        returnTrip += rt;
        fine += fi;
        platformDeduct += pd;
        afterHold += ah;
        afterRelease += ar;
        operateGross += og;
        orderGross += lineOrderGross;
        totalQty += qty;
        const shopName = row.OA店铺名称 || "未知店铺";
        if(!shopMap[shopName]) shopMap[shopName] = {income:0,orderGross:0,operateGross:0,qty:0};
        shopMap[shopName].income += inc;
        shopMap[shopName].orderGross += lineOrderGross;
        shopMap[shopName].operateGross += og;
        shopMap[shopName].qty += qty;
        const salesName = row.销售员 || "未知销售";
        if(!salesMap[salesName]) salesMap[salesName] = {income:0,operateGross:0,qty:0};
        salesMap[salesName].income += inc;
        salesMap[salesName].operateGross += og;
        salesMap[salesName].qty += qty;
    });
    const afterNet = afterHold - afterRelease;
    const orderRate = totalIncome>0 ? Number((orderGross / totalIncome * 100).toFixed(2)) : 0;
    const operateRate = totalIncome>0 ? Number((operateGross / totalIncome * 100).toFixed(2)) : 0;
    let unitPrice = 0, unitProfit=0, unitOrderGross=0, unitGoodsCost=0;
    if(totalQty>0){
        unitPrice = Number((totalIncome / totalQty).toFixed(2));
        unitProfit = Number((operateGross / totalQty).toFixed(2));
        unitOrderGross = Number((orderGross / totalQty).toFixed(2));
        unitGoodsCost = Number((goodsCost / totalQty).toFixed(2));
    }
    return {
        周期: monthTag,
        店铺数量: Object.keys(shopMap).length,
        交易收入: Number(totalIncome.toFixed(2)),
        订单毛利: Number(orderGross.toFixed(2)),
        订单毛利率: orderRate,
        运营毛利: Number(operateGross.toFixed(2)),
        运营毛利率: operateRate,
        商品成本: Number(goodsCost.toFixed(2)),
        耗材成本: Number(materialCost.toFixed(2)),
        人工成本: Number(laborCost.toFixed(2)),
        头程运费: Number(firstTrip.toFixed(2)),
        退回运费: Number(returnTrip.toFixed(2)),
        罚款金额: Number(fine.toFixed(2)),
        店铺总计提金额: Number(platformDeduct.toFixed(2)),
        消费者售后预留金额: Number(afterHold.toFixed(2)),
        消费者售后释放金额: Number(afterRelease.toFixed(2)),
        售后净额: Number(afterNet.toFixed(2)),
        销售数量总计: totalQty,
        客单价: unitPrice,
        均单利润: unitProfit,
        单均订单毛利: unitOrderGross,
        单均商品成本: unitGoodsCost,
        has_sales_quantity: totalQty>0,
        店铺数据: shopMap,
        sales数据: salesMap,
        rawData: rawData
    };
}

// 单月下拉自动加载数据
async function loadSingleMonthData(){
    const tag = document.getElementById("single-month-select").value;
    if(!tag) return;
    try {
        const mRes = await supabase.from("monthly_metrics").eq("month_tag", tag).single();
        const m = mRes.data;
        if(!m){
            document.getElementById("single-metrics-wrap").innerHTML = `<span class="warn">无此月份数据</span>`;
            document.getElementById("single-chart").innerHTML = "";
            return;
        }
        let metricHtml = `
        <div class="row">
            <div class="metric-card">店铺数量：${m.store_count}</div>
            <div class="metric-card">交易收入：¥${m.total_income}</div>
            <div class="metric-card">订单毛利率：${m.order_gross_rate}%</div>
            <div class="metric-card">运营毛利率：${m.operate_gross_rate}%</div>
            <div class="metric-card">总销量：${m.total_quantity}</div>
            <div class="metric-card">客单价：¥${m.unit_price}</div>
            <div class="metric-card">均单利润：¥${m.unit_profit}</div>
        </div>
        <div class="tip">
            预警阈值：订单毛利率≥${alertConfig.ORDER_MARGIN_RATE_THRESHOLD}% | 运营毛利率≥${alertConfig.OPERATE_MARGIN_RATE_THRESHOLD}%
            | 销量≥${alertConfig.SALES_QUANTITY_THRESHOLD} | 客单价≥${alertConfig.UNIT_PRICE_THRESHOLD} | 均单利润≥${alertConfig.UNIT_PROFIT_THRESHOLD}
        </div>
        `;
        document.getElementById("single-metrics-wrap").innerHTML = metricHtml;
        const trace1 = {x:["订单毛利","运营毛利"], y:[m.order_gross_profit, m.operate_gross_profit], type:"bar", name:"金额(元)"};
        Plotly.newPlot("single-chart", [trace1], {title:`${tag} 月度核心毛利对比`});
    } catch(err) {
        console.error("加载单月数据异常：", err);
        document.getElementById("single-metrics-wrap").innerHTML = `<span class="warn">加载失败：${err.message}</span>`;
        document.getElementById("single-chart").innerHTML = "";
    }
}

// 双月下拉自动对比
async function loadCompareData(){
    const tagA = document.getElementById("compare-month-a").value;
    const tagB = document.getElementById("compare-month-b").value;
    if(!tagA || !tagB) return;
    if(tagA === tagB) {
        document.getElementById("compare-table-wrap").innerHTML = `<span class="warn">两个月份不能相同</span>`;
        return;
    }
    try{
        const mARes = await supabase.from("monthly_metrics").eq("month_tag", tagA).single();
        const mBRes = await supabase.from("monthly_metrics").eq("month_tag", tagB).single();
        const mA = mARes.data;
        const mB = mBRes.data;
        if(!mA || !mB){
            document.getElementById("compare-table-wrap").innerHTML = `<span class="warn">其中一个月份无数据</span>`;
            return;
        }
        const fields = [
            ["交易收入","total_income"],
            ["订单毛利","order_gross_profit"],
            ["运营毛利","operate_gross_profit"],
            ["订单毛利率%","order_gross_rate"],
            ["运营毛利率%","operate_gross_rate"],
            ["总销量","total_quantity"],
            ["客单价","unit_price"],
            ["均单利润","unit_profit"]
        ];
        let tableHtml = `<table><tr><th>指标名称</th><th>上期【${tagA}】</th><th>本期【${tagB}】</th><th>环比差值</th></tr>`;
        fields.forEach(([name,key])=>{
            const valA = Number(mA[key]);
            const valB = Number(mB[key]);
            const diff = (valB - valA).toFixed(2);
            const color = diff > 0 ? "#10b981" : "#ef4444";
            tableHtml += `<tr><td>${name}</td><td>${valA}</td><td>${valB}</td><td style="color:${color}">${diff}</td></tr>`;
        });
        tableHtml += `</table>`;
        document.getElementById("compare-table-wrap").innerHTML = tableHtml;
        const traceA = {name:tagA, x:["交易收入","订单毛利","运营毛利"], y:[mA.total_income, mA.order_gross_profit, mA.operate_gross_profit], type:"bar"};
        const traceB = {name:tagB, x:["交易收入","订单毛利","运营毛利"], y:[mB.total_income, mB.order_gross_profit, mB.operate_gross_profit], type:"bar"};
        Plotly.newPlot("compare-chart", [traceA, traceB], {title:"两月核心指标分组对比"});
    }catch(err){
        console.error("双月对比加载异常：", err);
        document.getElementById("compare-table-wrap").innerHTML = `<span class="warn">加载失败：${err.message}</span>`;
    }
}

// 保存警戒值配置
function saveAlertConfig(){
    alertConfig.ORDER_MARGIN_RATE_THRESHOLD = Number(document.getElementById("alert-order-rate").value);
    alertConfig.OPERATE_MARGIN_RATE_THRESHOLD = Number(document.getElementById("alert-operate-rate").value);
    alertConfig.SALES_QUANTITY_THRESHOLD = Number(document.getElementById("alert-qty").value);
    alertConfig.UNIT_PRICE_THRESHOLD = Number(document.getElementById("alert-price").value);
    alertConfig.UNIT_PROFIT_THRESHOLD = Number(document.getElementById("alert-profit").value);
    document.getElementById("alert-msg").innerHTML = `<span class="success">✅ 警戒值配置保存成功</span>`;
}
