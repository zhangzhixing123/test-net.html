<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temu云端数据分析工具 Supabase版</title>
    <!-- 国内稳定CDN，调整加载顺序，确保supabase优先加载 -->
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-100-M/@supabase/supabase-js/2.33.1/supabase.min.js"></script>
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-100-M/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-100-M/plotly.js/2.20.0/plotly.min.js"></script>
    <style>
        * {box-sizing: border-box;font-family: "Microsoft Yahei",sans-serif;}
        body {margin:0;padding:20px;background:#f7f8fa;}
        .container {max-width:1600px;margin:0 auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 12px #e5e7eb;}
        .header {display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid #eee;padding-bottom:16px;}
        .menu-bar {display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
        .menu-btn {padding:10px 16px;border:none;border-radius:8px;background:#eef2ff;color:#2563eb;cursor:pointer;font-size:14px;}
        .menu-btn.active {background:#2563eb;color:#fff;}
        .panel {display:none;margin-top:16px;}
        .panel.show {display:block;}
        .row {display:flex;gap:16px;margin:12px 0;flex-wrap:wrap;align-items:center;}
        input, select, button, textarea {padding:10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;}
        button {background:#2563eb;color:#fff;border:none;cursor:pointer;}
        button.danger {background:#ef4444;}
        table {width:100%;border-collapse:collapse;margin:16px 0;}
        table th, table td {border:1px solid #e5e7eb;padding:10px;text-align:left;}
        table th {background:#f9fafb;}
        .chart-box {width:100%;height:500px;margin:20px 0;}
        .tip {color:#6b7280;font-size:13px;margin:8px 0;}
        .warn {color:#ef4444;}
        .success {color:#10b981;}
        .metric-card {flex:1;min-width:180px;padding:16px;background:#f0f7ff;border-radius:8px;}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Temu 云端数据分析工具（Supabase跨设备同步）</h1>
        <div id="user-area" style="display:block;">
            <span class="success">✅ 已自动登录，可直接操作全部功能</span>
        </div>
    </div>

    <div class="menu-bar" id="main-menu" style="display:flex;">
        <button class="menu-btn active" data-target="upload-panel">📤 上传月度数据入库</button>
        <button class="menu-btn" data-target="single-panel">📊 单月云端数据分析</button>
        <button class="menu-btn" data-target="compare-panel">📈 双月历史对比</button>
        <button class="menu-btn" data-target="manage-panel">🗃️ 云端数据管理</button>
        <button class="menu-btn" data-target="alert-panel">⚙️ 警戒值设置</button>
        <button class="menu-btn" data-target="template-panel">📥 下载数据模板</button>
    </div>

    <div class="panel show" id="upload-panel">
        <h2>📤 上传报表并保存至Supabase云端</h2>
        <div class="row">
            <label>月份标签：</label>
            <input type="text" id="month-tag" placeholder="如2026-06、6月报表">
        </div>
        <div class="row">
            <label>上传Excel/CSV文件：</label>
            <input type="file" id="file-upload" accept=".xlsx,.xls,.csv">
        </div>
        <div class="tip">预览前10行数据：</div>
        <div id="file-preview"></div>
        <button onclick="saveDataToCloud()">✅ 保存到云端数据库</button>
        <div id="upload-msg"></div>
    </div>

    <div class="panel" id="single-panel">
        <h2>📊 调取云端单月数据分析</h2>
        <div class="row">
            <label>选择月份：</label>
            <select id="single-month-select"></select>
            <button onclick="loadSingleMonthData()">加载数据</button>
        </div>
        <div id="single-metrics-wrap"></div>
        <div class="chart-box" id="single-chart"></div>
    </div>

    <div class="panel" id="compare-panel">
        <h2>📈 任意两月云端数据对比</h2>
        <div class="row">
            <label>月份A(上期)：</label>
            <select id="compare-month-a"></select>
            <label>月份B(本期)：</label>
            <select id="compare-month-b"></select>
            <button onclick="loadCompareData()">开始对比</button>
        </div>
        <div id="compare-table-wrap"></div>
        <div class="chart-box" id="compare-chart"></div>
    </div>

    <div class="panel" id="manage-panel">
        <h2>🗃️ 云端全部历史月度数据</h2>
        <div id="manage-table-wrap"></div>
        <div class="row">
            <label>删除月份：</label>
            <select id="del-month-select"></select>
            <button class="danger" onclick="delMonthData()">删除该月全部云端数据</button>
        </div>
    </div>

    <div class="panel" id="alert-panel">
        <h2>⚙️ 自定义警戒值设置</h2>
        <div class="row">
            <div>订单毛利率警戒值(%)：<input type="number" step="0.1" id="alert-order-rate" value="20"></div>
            <div>运营毛利率警戒值(%)：<input type="number" step="0.1" id="alert-operate-rate" value="15"></div>
            <div>销售数量警戒值(单)：<input type="number" id="alert-qty" value="3000"></div>
            <div>客单价警戒值(元)：<input type="number" step="0.1" id="alert-price" value="10"></div>
            <div>均单利润警戒值(元)：<input type="number" step="0.1" id="alert-profit" value="2"></div>
        </div>
        <button onclick="saveAlertConfig()">保存警戒值</button>
        <div id="alert-msg"></div>
    </div>

    <div class="panel" id="template-panel">
        <h2>📥 下载数据模板</h2>
        <p class="tip">下载标准Excel模板，按字段填写后上传云端永久保存</p>
        <button onclick="downloadTemplate()">下载Excel模板</button>
    </div>
</div>

<script>
// ========== 1. 优先初始化全局变量，解决变量未初始化报错 ==========
let currentExcelData = null;
let alertConfig = {
    ORDER_MARGIN_RATE_THRESHOLD: 20,
    OPERATE_MARGIN_RATE_THRESHOLD: 15,
    SALES_QUANTITY_THRESHOLD: 3000,
    UNIT_PRICE_THRESHOLD: 10,
    UNIT_PROFIT_THRESHOLD: 2
};
let isLogin = true;
const BUCKET_NAME = "files";

// ========== 2. 等待supabase脚本加载完成再初始化客户端 ==========
let supabase = null;
document.addEventListener('DOMContentLoaded', async function() {
    // 等待supabase全局对象就绪
    let waitCount = 0;
    while (!window.supabase && waitCount < 20) {
        await new Promise(r => setTimeout(r, 100));
        waitCount++;
    }
    if (!window.supabase) {
        alert("Supabase 脚本加载失败，请刷新页面重试");
        return;
    }
    // 初始化客户端
    const SUPABASE_URL = "https://odkkixjekbrlcubqoedh.supabase.co/rest/v1/";
    const SUPABASE_KEY = "sb_publishable_mvFibBRbdZbCgprH8k9Exg_352fXP2p";
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    // 页面加载完成自动刷新月份列表
    refreshMonthSelect();
});

// ========== 菜单切换 ==========
document.querySelectorAll(".menu-btn").forEach(btn=>{
    btn.onclick = ()=>{
        hideAllPanel();
        const targetId = btn.dataset.target;
        document.getElementById(targetId).classList.add("show");
        document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
    }
})
function hideAllPanel(){
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("show"));
}

// ========== Supabase 通用函数 ==========
async function getAllMonthTags(){
    if(!supabase) return [];
    const {data} = await supabase.from("monthly_metrics").select("month_tag, upload_time").order("month_tag", {ascending:false});
    return data || [];
}
async function refreshMonthSelect(){
    const list = await getAllMonthTags();
    const tags = list.map(item=>item.month_tag);
    const sel1 = document.getElementById("single-month-select");
    const selA = document.getElementById("compare-month-a");
    const selB = document.getElementById("compare-month-b");
    const selDel = document.getElementById("del-month-select");
    sel1.innerHTML = selA.innerHTML = selB.innerHTML = selDel.innerHTML = "";
    tags.forEach(t=>{
        sel1.innerHTML += `<option value="${t}">${t}</option>`;
        selA.innerHTML += `<option value="${t}">${t}</option>`;
        selB.innerHTML += `<option value="${t}">${t}</option>`;
        selDel.innerHTML += `<option value="${t}">${t}</option>`;
    })
    renderManageTable(list);
}
async function delMonthData(){
    if(!supabase) return alert("云端客户端未加载完成，请等待");
    const tag = document.getElementById("del-month-select").value;
    if(!confirm(`确定删除【${tag}】全部云端数据？无法恢复`)) return;
    const {data:refData} = await supabase.from("monthly_file_ref").select("storage_file_path").eq("month_tag", tag);
    if(refData.length>0){
        const path = refData[0].storage_file_path;
        await supabase.storage.from(BUCKET_NAME).remove([path]);
    }
    await supabase.from("monthly_file_ref").delete().eq("month_tag", tag);
    await supabase.from("monthly_metrics").delete().eq("month_tag", tag);
    alert("删除成功");
    refreshMonthSelect();
}
function renderManageTable(list){
    let html = `<table><tr><th>月份标签</th><th>上传时间</th></tr>`;
    list.forEach(item=>{
        html += `<tr><td>${item.month_tag}</td><td>${item.upload_time}</td></tr>`;
    })
    html += `</table>`;
    document.getElementById("manage-table-wrap").innerHTML = html;
}

// ========== Excel 文件解析 & 模板下载 ==========
document.getElementById("file-upload").onchange = async function(e){
    const file = e.target.files[0];
    if(!file) return;
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf);
    const sheet = wb.Sheets[wb.SheetNames[0]];
    currentExcelData = XLSX.utils.sheet_to_json(sheet);
    const preview = currentExcelData.slice(0,10);
    let html = `<table>`;
    if(preview.length>0){
        const keys = Object.keys(preview[0]);
        html += `<tr>${keys.map(k=>`<th>${k}</th>`).join("")}</tr>`;
        preview.forEach(row=>{
            html += `<tr>${keys.map(k=>`<td>${row[k]??""}</td>`).join("")}</tr>`;
        })
    }
    html += `</table>`;
    document.getElementById("file-preview").innerHTML = html;
}
function downloadTemplate(){
    const cols = ["OA店铺名称","销售员","交易收入","商品成本","耗材成本","人工成本","头程运费","退回运费","消费者售后预留金额","消费者售后释放金额","店铺总计提金额","罚款金额","运营毛利","销售数量"];
    const ws = XLSX.utils.aoa_to_sheet([cols]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "数据模板");
    const buf = XLSX.write(wb, {type:"array", bookType:"xlsx"});
    const blob = new Blob([buf], {type:"application/octet-stream"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Temu店铺数据上传模板.xlsx";
    a.click();
}

// ========== 云端保存月度数据 ==========
async function saveDataToCloud(){
    if(!supabase) return alert("云端客户端加载未完成，请等待页面加载完毕再操作");
    const tag = document.getElementById("month-tag").value.trim();
    if(!tag) return alert("请输入月份标签");
    if(!currentExcelData) return alert("请先上传Excel/CSV文件");
    const fileDom = document.getElementById("file-upload");
    const file = fileDom.files[0];
    const ext = file.name.split(".").pop();
    const buf = await file.arrayBuffer();
    const storagePath = `month_data/${tag}/source.${ext}`;
    const {error:upErr} = await supabase.storage.from(BUCKET_NAME).upload(storagePath, buf, {cacheControl:"3600"});
    if(upErr) return document.getElementById("upload-msg").innerHTML = `<span class="warn">文件上传失败:${upErr.message}</span>`;
    const metrics = calcMetrics(currentExcelData, tag);
    const metricRow = {
        month_tag: tag,
        store_count: metrics.店铺数量,
        total_income: metrics.交易收入,
        order_gross_profit: metrics.订单毛利,
        order_gross_rate: metrics.订单毛利率,
        operate_gross_profit: metrics.运营毛利,
        operate_gross_rate: metrics.运营毛利率,
        goods_cost: metrics.商品成本,
        material_cost: metrics.耗材成本,
        labor_cost: metrics.人工成本,
        first_trip_cost: metrics.头程运费,
        return_trip_cost: metrics.退回运费,
        fine_amount: metrics.罚款金额,
        platform_deduct: metrics.店铺总计提金额,
        after_sales_hold: metrics.消费者售后预留金额,
        after_sales_release: metrics.消费者售后释放金额,
        after_sales_net: metrics.售后净额,
        total_quantity: metrics.销售数量总计,
        unit_price: metrics.客单价,
        unit_profit: metrics.均单利润,
        unit_order_gross: metrics.单均订单毛利,
        unit_goods_cost: metrics.单均商品成本,
        upload_time: new Date().toISOString()
    }
    await supabase.from("monthly_metrics").upsert(metricRow, {onConflict:"month_tag"});
    const shopJson = JSON.stringify(metrics.店铺数据);
    const salesJson = JSON.stringify(metrics.sales数据);
    await supabase.from("monthly_file_ref").upsert({
        month_tag: tag,
        storage_file_path: storagePath,
        shop_json: shopJson,
        sales_json: salesJson
    }, {onConflict:"month_tag"});
    document.getElementById("upload-msg").innerHTML = `<span class="success">✅ ${tag} 数据已存入云端，换设备可直接调取</span>`;
    refreshMonthSelect();
}

// ========== 指标计算逻辑 ==========
function calcMetrics(rawData, monthTag){
    let totalIncome = 0, goodsCost=0, materialCost=0, laborCost=0;
    let firstTrip=0, returnTrip=0, fine=0, platformDeduct=0;
    let afterHold=0, afterRelease=0, operateGross=0, orderGross=0, totalQty=0;
    const shopMap = {};
    const salesMap = {};
    rawData.forEach(row=>{
        const inc = Number(row.交易收入||0);
        const gc = Number(row.商品成本||0);
        const mc = Number(row.耗材成本||0);
        const lc = Number(row.人工成本||0);
        const ft = Number(row.头程运费||0);
        const rt = Number(row.退回运费||0);
        const fi = Number(row.罚款金额||0);
        const pd = Number(row.店铺总计提金额||0);
        const ah = Number(row.消费者售后预留金额||0);
        const ar = Number(row.消费者售后释放金额||0);
        const og = Number(row.运营毛利||0);
        const qty = Number(row.销售数量||0);
        const lineOrderGross = inc - ft - mc - lc - gc - ah + ar;
        totalIncome += inc;
        goodsCost += gc;
        materialCost += mc;
        laborCost += lc;
        firstTrip += ft;
        returnTrip += rt;
        fine += fi;
        platformDeduct += pd;
        afterHold += ah;
        afterRelease += ar;
        operateGross += og;
        orderGross += lineOrderGross;
        totalQty += qty;
        const shopName = row.OA店铺名称 || "未知店铺";
        if(!shopMap[shopName]) shopMap[shopName] = {income:0, orderGross:0, operateGross:0, qty:0};
        shopMap[shopName].income += inc;
        shopMap[shopName].orderGross += lineOrderGross;
        shopMap[shopName].operateGross += og;
        shopMap[shopName].qty += qty;
        const salesName = row.销售员 || "未知销售";
        if(!salesMap[salesName]) salesMap[salesName] = {income:0, operateGross:0, qty:0};
        salesMap[salesName].income += inc;
        salesMap[salesName].operateGross += og;
        salesMap[salesName].qty += qty;
    })
    const afterNet = afterHold - afterRelease;
    const orderRate = totalIncome>0 ? Number((orderGross / totalIncome * 100).toFixed(2)) : 0;
    const operateRate = totalIncome>0 ? Number((operateGross / totalIncome * 100).toFixed(2)) : 0;
    let unitPrice = 0, unitProfit=0, unitOrderGross=0, unitGoodsCost=0;
    if(totalQty>0){
        unitPrice = Number((totalIncome / totalQty).toFixed(2));
        unitProfit = Number((operateGross / totalQty).toFixed(2));
        unitOrderGross = Number((orderGross / totalQty).toFixed(2));
        unitGoodsCost = Number((goodsCost / totalQty).toFixed(2));
    }
    return {
        周期: monthTag,
        店铺数量: Object.keys(shopMap).length,
        交易收入: Number(totalIncome.toFixed(2)),
        订单毛利: Number(orderGross.toFixed(2)),
        订单毛利率: orderRate,
        运营毛利: Number(operateGross.toFixed(2)),
        运营毛利率: operateRate,
        商品成本: Number(goodsCost.toFixed(2)),
        耗材成本: Number(materialCost.toFixed(2)),
        人工成本: Number(laborCost.toFixed(2)),
        头程运费: Number(firstTrip.toFixed(2)),
        退回运费: Number(returnTrip.toFixed(2)),
        罚款金额: Number(fine.toFixed(2)),
        店铺总计提金额: Number(platformDeduct.toFixed(2)),
        消费者售后预留金额: Number(afterHold.toFixed(2)),
        消费者售后释放金额: Number(afterRelease.toFixed(2)),
        售后净额: Number(afterNet.toFixed(2)),
        销售数量总计: totalQty,
        客单价: unitPrice,
        均单利润: unitProfit,
        单均订单毛利: unitOrderGross,
        单均商品成本: unitGoodsCost,
        has_sales_quantity: totalQty>0,
        店铺数据: shopMap,
        sales数据: salesMap,
        rawData: rawData
    }
}

// ========== 单月数据加载 ==========
async function loadSingleMonthData(){
    if(!supabase) return alert("云端客户端未加载完成");
    const tag = document.getElementById("single-month-select").value;
    const {data:metricData} = await supabase.from("monthly_metrics").select("*").eq("month_tag", tag).single();
    const {data:refData} = await supabase.from("monthly_file_ref").select("storage_file_path, shop_json, sales_json").eq("month_tag", tag).single();
    const m = metricData;
    let metricHtml = `
    <div class="row">
        <div class="metric-card">店铺数量：${m.store_count}</div>
        <div class="metric-card">交易收入：¥${m.total_income}</div>
        <div class="metric-card">订单毛利率：${m.order_gross_rate}%</div>
        <div class="metric-card">运营毛利率：${m.operate_gross_rate}%</div>
        <div class="metric-card">总销量：${m.total_quantity}</div>
        <div class="metric-card">客单价：¥${m.unit_price}</div>
        <div class="metric-card">均单利润：¥${m.unit_profit}</div>
    </div>
    `;
    document.getElementById("single-metrics-wrap").innerHTML = metricHtml;
    const trace1 = {x:["订单毛利","运营毛利"], y:[m.order_gross_profit, m.operate_gross_profit], type:"bar"};
    Plotly.newPlot("single-chart", [trace1], {title:`${tag} 毛利对比`});
}

// ========== 双月对比加载 ==========
async function loadCompareData(){
    if(!supabase) return alert("云端客户端未加载完成");
    const tagA = document.getElementById("compare-month-a").value;
    const tagB = document.getElementById("compare-month-b").value;
    if(tagA === tagB) return alert("两个月份不能相同");
    const {data:mA} = await supabase.from("monthly_metrics").select("*").eq("month_tag", tagA).single();
    const {data:mB} = await supabase.from("monthly_metrics").select("*").eq("month_tag", tagB).single();
    const fields = [
        ["交易收入", "total_income"],["订单毛利","order_gross_profit"],["运营毛利","operate_gross_profit"],
        ["订单毛利率%","order_gross_rate"],["运营毛利率%","operate_gross_rate"],["总销量","total_quantity"]
    ];
    let tableHtml = `<table><tr><th>指标</th><th>${tagA}</th><th>${tagB}</th><th>差值</th></tr>`;
    fields.forEach(([name, key])=>{
        const valA = mA[key];
        const valB = mB[key];
        const diff = (valB - valA).toFixed(2);
        tableHtml += `<tr>
            <td>${name}</td>
            <td>${valA}</td>
            <td>${valB}</td>
            <td style="color:${diff>0?'#10b981':'#ef4444'}">${diff}</td>
        </tr>`;
    })
    tableHtml += `</table>`;
    document.getElementById("compare-table-wrap").innerHTML = tableHtml;
    const traceA = {name:tagA, x:["收入","订单毛利","运营毛利"], y:[mA.total_income, mA.order_gross_profit, mA.operate_gross_profit], type:"bar"};
    const traceB = {name:tagB, x:["收入","订单毛利","运营毛利"], y:[mB.total_income, mB.order_gross_profit, mB.operate_gross_profit], type:"bar"};
    Plotly.newPlot("compare-chart", [traceA, traceB], {title:"两月核心指标对比"});
}

// ========== 保存警戒值 ==========
function saveAlertConfig(){
    alertConfig.ORDER_MARGIN_RATE_THRESHOLD = Number(document.getElementById("alert-order-rate").value);
    alertConfig.OPERATE_MARGIN_RATE_THRESHOLD = Number(document.getElementById("alert-operate-rate").value);
    alertConfig.SALES_QUANTITY_THRESHOLD = Number(document.getElementById("alert-qty").value);
