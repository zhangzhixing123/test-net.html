<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temu 云端数据分析工具 Supabase版</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; font-family: "Microsoft YaHei", Arial, sans-serif; }
    body { margin: 0; padding: 20px; background: #f7f8fa; color: #111827; }
    .container { max-width: 1600px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 12px #e5e7eb; }
    .header { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 16px; }
    .header h1 { margin: 0; font-size: 24px; line-height: 1.35; }
    .menu-bar { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .menu-btn { padding: 10px 16px; border: none; border-radius: 6px; background: #eef2ff; color: #2563eb; cursor: pointer; font-size: 14px; }
    .menu-btn.active { background: #2563eb; color: #fff; }
    .panel { display: none; margin-top: 16px; }
    .panel.show { display: block; }
    .row { display: flex; gap: 16px; margin: 12px 0; flex-wrap: wrap; align-items: center; }
    label { font-weight: 600; }
    input, select, button, textarea { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    input, select { min-width: 180px; background: #fff; }
    button { background: #2563eb; color: #fff; border: none; cursor: pointer; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    button.danger { background: #ef4444; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
    table th, table td { border: 1px solid #e5e7eb; padding: 10px; text-align: left; vertical-align: top; }
    table th { background: #f9fafb; }
    .chart-box { width: 100%; min-height: 360px; margin: 20px 0; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; overflow-x: auto; }
    .tip { color: #6b7280; font-size: 13px; margin: 8px 0; }
    .warn { color: #ef4444; }
    .success { color: #10b981; }
    .metric-card { flex: 1; min-width: 180px; padding: 16px; background: #f0f7ff; border-radius: 8px; }
    .metric-card strong { display: block; margin-bottom: 8px; font-size: 13px; color: #4b5563; }
    #load-tip { color: #10b981; font-weight: 700; margin-bottom: 10px; }
    .table-scroll { max-width: 100%; overflow-x: auto; }
    @media (max-width: 720px) {
      body { padding: 10px; }
      .container { padding: 16px; }
      .header { align-items: flex-start; flex-direction: column; }
      input, select, button { width: 100%; }
      .menu-btn { width: auto; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Temu 云端数据分析工具（Supabase 跨设备同步）</h1>
    <div id="user-area"><span class="success">已自动登录，可直接操作全部功能</span></div>
  </div>

  <div id="load-tip">页面已就绪，支持 CSV 上传；XLSX 上传依赖 SheetJS CDN 加载成功。</div>

  <div class="menu-bar" id="main-menu">
    <button class="menu-btn active" data-target="upload-panel">上传月度数据入库</button>
    <button class="menu-btn" data-target="single-panel">单月数据分析</button>
    <button class="menu-btn" data-target="compare-panel">双月历史对比</button>
    <button class="menu-btn" data-target="manage-panel">云端数据管理</button>
    <button class="menu-btn" data-target="alert-panel">警戒值设置</button>
    <button class="menu-btn" data-target="template-panel">下载数据模板</button>
  </div>

  <div class="panel show" id="upload-panel">
    <h2>上传报表并保存至 Supabase 云端</h2>
    <div class="row">
      <label for="month-tag">月份标签：</label>
      <input type="text" id="month-tag" placeholder="例如：2026-06 月报表">
    </div>
    <div class="row">
      <label for="file-upload">上传 Excel/CSV 文件：</label>
      <input type="file" id="file-upload" accept=".xlsx,.xls,.csv">
    </div>
    <div class="tip">预览前 10 行数据：</div>
    <div id="file-preview" class="table-scroll"></div>
    <button id="save-btn" onclick="saveDataToCloud()">保存到云端数据库</button>
    <div id="upload-msg"></div>
  </div>

  <div class="panel" id="single-panel">
    <h2>调取云端单月数据分析</h2>
    <div class="row">
      <label for="single-month-select">选择月份：</label>
      <select id="single-month-select"></select>
      <button onclick="loadSingleMonthData()">加载数据</button>
    </div>
    <div id="single-metrics-wrap"></div>
    <div class="chart-box" id="single-chart"></div>
  </div>

  <div class="panel" id="compare-panel">
    <h2>任意两月云端数据对比</h2>
    <div class="row">
      <label for="compare-month-a">月份 A（上期）：</label>
      <select id="compare-month-a"></select>
      <label for="compare-month-b">月份 B（本期）：</label>
      <select id="compare-month-b"></select>
      <button onclick="loadCompareData()">开始对比</button>
    </div>
    <div id="compare-table-wrap" class="table-scroll"></div>
